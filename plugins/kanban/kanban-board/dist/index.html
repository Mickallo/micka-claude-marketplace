<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon-Dh9XFatv.svg" />
    <script type="module" crossorigin src="/assets/index-DUv1_txy.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B-KeHVC4.css">
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>Kanban Board</h1>
        <div id="pipeline-filter"></div>
      </div>
      <div class="header-tabs">
        <button class="tab-btn active" id="tab-board">Board</button>
        <button class="tab-btn" id="tab-list">List</button>
      </div>
      <div class="header-meta">
        <span id="count-summary"></span>
        <button id="theme-toggle-btn" title="Toggle theme"></button>
        <button id="pipeline-settings-btn" title="Pipeline Settings"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/><circle cx="5" cy="4" r="1.5" fill="currentColor"/><circle cx="10" cy="8" r="1.5" fill="currentColor"/><circle cx="7" cy="12" r="1.5" fill="currentColor"/></svg></button>
        <button id="refresh-btn" title="Refresh"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8a5.5 5.5 0 0 1 9.3-4M13.5 8a5.5 5.5 0 0 1-9.3 4"/><path d="M11.8 1.5V4h-2.5M4.2 14.5V12h2.5"/></svg></button>
      </div>
    </header>
    <div class="toolbar">
      <input type="search" id="search-input" placeholder="Search tasks…" autocomplete="off" />
      <select id="sort-select">
        <option value="default">Sort: Default</option>
        <option value="created_desc">Created &#x2193; Newest</option>
        <option value="created_asc">Created &#x2191; Oldest</option>
        <option value="completed_desc">Completed &#x2193;</option>
      </select>
      <button id="hide-done-btn" class="toolbar-toggle-btn" title="Hide Done items completed more than 3 days ago">
        Hide old &#x2705; (3d+)
      </button>
    </div>
    <main id="board"></main>
    <main id="list-view" class="hidden"></main>
    <!-- Task Detail Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <button class="modal-close" id="modal-close">&times;</button>
        <div id="modal-content"></div>
      </div>
    </div>
    <!-- Add Card Modal -->
    <div id="add-card-overlay" class="modal-overlay hidden">
      <div class="modal" style="max-width:480px">
        <button class="modal-close" id="add-card-close">&times;</button>
        <h1 style="font-size:1.1rem;color:#f8fafc;margin-bottom:16px">New Card</h1>
        <form id="add-card-form" autocomplete="off">
          <div class="form-group">
            <label for="add-title">Title *</label>
            <input type="text" id="add-title" required placeholder="Task title" />
          </div>
          <div class="form-group form-row">
            <div class="form-col">
              <label for="add-priority">Priority</label>
              <select id="add-priority">
                <option value="high">High</option>
                <option value="medium" selected>Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="add-description">Description</label>
            <textarea id="add-description" rows="4" placeholder="Requirements in markdown"></textarea>
          </div>
          <div class="form-group">
            <label for="add-tags">Tags <span style="color:#64748b;font-weight:400">(comma separated)</span></label>
            <input type="text" id="add-tags" placeholder="e.g. feature, api, ui" />
          </div>
          <div class="form-group">
            <label>Attachments</label>
            <div class="attachment-drop-zone" id="add-attachment-zone">
              <span>&#x1F4CE; Drop images here or click to attach</span>
              <input type="file" id="add-attachment-input" accept="image/*" multiple hidden />
            </div>
            <div class="attachments-grid" id="add-attachment-preview"></div>
          </div>
          <button type="submit" class="form-submit">Add Card</button>
        </form>
      </div>
    </div>
    <!-- Pipeline Settings Modal -->
    <div id="pipeline-overlay" class="modal-overlay hidden">
      <div class="modal pipeline-modal">
        <button class="modal-close" id="pipeline-close">&times;</button>
        <h1 style="font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:16px;letter-spacing:-0.01em">Pipeline Settings</h1>
        <div id="pipeline-content"></div>
      </div>
    </div>
  </body>
</html>
